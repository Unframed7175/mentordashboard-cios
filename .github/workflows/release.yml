name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: windows-latest
            args: '--bundles nsis --target x86_64-pc-windows-msvc'
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract changelog entry for release body
        run: |
          node scripts/extract-changelog-entry.mjs CHANGELOG.md "${{ runner.temp }}/release-body.md" ${{ github.ref_name }}

      - name: Build and release
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mentordashboard CIOS ${{ github.ref_name }}'
          releaseBodyFile: ${{ runner.temp }}/release-body.md
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # De landingspagina-update draait als aparte job NA de release. Reden: een los
  # `release: published`-workflow vuurt nooit, omdat tauri-action de release via
  # GITHUB_TOKEN publiceert en GitHub geen workflows triggert op GITHUB_TOKEN-events.
  # Door het hier te ketenen (needs: release) loopt het in dezelfde pipeline mee.
  update-landing-page:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mentordashboard-cios (voor de scripts)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: main-repo

      - name: Checkout ciosmentorendashboard
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: Unframed7175/ciosmentorendashboard
          token: ${{ secrets.LANDING_PAGE_PAT }}
          path: landing-page

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Extract changelog entry
        run: |
          node main-repo/scripts/extract-changelog-entry.mjs main-repo/CHANGELOG.md /tmp/release-body.md ${{ github.ref_name }}

      - name: Update index.html
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node main-repo/scripts/update-landing-page.mjs landing-page/index.html "$VERSION" /tmp/release-body.md

      - name: Commit en push
        working-directory: landing-page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Geen wijzigingen" && exit 0
          git commit -m "fix: update landingspagina naar ${{ github.ref_name }}"
          git push origin main
