name: Update landing page (handmatig)

# De automatische landingspagina-update gebeurt in release.yml (job: update-landing-page),
# geketend aan de release. Een los `release: published`-trigger werkt NIET: tauri-action
# publiceert de release via GITHUB_TOKEN en GitHub triggert geen workflows op
# GITHUB_TOKEN-events. Deze workflow is daarom alleen een handmatige back-fill voor het
# geval de pagina alsnog uit sync raakt. Geef de versie op die boven in CHANGELOG.md staat.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versietag (bv. v2.11.2) — moet de bovenste CHANGELOG.md-sectie zijn'
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-landing-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mentordashboard-cios (voor de scripts)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: main-repo

      - name: Checkout ciosmentorendashboard
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: Unframed7175/ciosmentorendashboard
          token: ${{ secrets.LANDING_PAGE_PAT }}
          path: landing-page

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Extract changelog entry
        run: |
          node main-repo/scripts/extract-changelog-entry.mjs main-repo/CHANGELOG.md /tmp/release-body.md ${{ inputs.version }}

      - name: Update index.html
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          node main-repo/scripts/update-landing-page.mjs landing-page/index.html "$VERSION" /tmp/release-body.md

      - name: Commit en push
        working-directory: landing-page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Geen wijzigingen" && exit 0
          git commit -m "fix: update landingspagina naar ${{ inputs.version }}"
          git push origin main
