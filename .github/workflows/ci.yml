name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Geen cross-platform build-job hier (bewust). De `tauri build` faalt op PR's
  # zonder TAURI_SIGNING_PRIVATE_KEY omdat tauri.conf.json een updater-pubkey heeft
  # ("A public key has been found, but no private key"). Volledige gesigneerde
  # builds voor Windows + macOS draaien in release.yml bij elke tag. PR-gating
  # heeft alleen de `test`-job nodig (en dat is ook de enige verplichte check).
